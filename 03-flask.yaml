apiVersion: v1
kind: Service
metadata:
  name: myapp-svc
  # annotations:
  #   cloud.google.com/backend-config: '{"default": "my-backend-config"}'
spec:
  selector:
    app: myapp
  ports: 
  - port: 5000
    targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: ekchoi3912/was1:v1
        ports:
        - containerPort: 5000
        env:
        - name: MYSQL_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: MYSQL_HOST
        - name: MYSQL_DB
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: MYSQL_DB
        - name: SESSION_REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: SESSION_REDIS_HOST
        - name: SESSION_REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: SESSION_REDIS_PORT
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: MYSQL_USER
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: MYSQL_PASSWORD
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: SECRET_KEY
